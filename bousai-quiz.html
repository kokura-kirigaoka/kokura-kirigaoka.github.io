<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>防災サバイバルクイズ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Antique+B1&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink-night:#10192B;
    --ink-night-2:#182238;
    --ink-night-3:#1F2C48;
    --alert-amber:#F2A93B;
    --alert-amber-dim:#C98A2E;
    --safe-green:#2E9166;
    --danger-red:#D1545C;
    --fog:#93A0B4;
    --paper:#F5F0E6;
    --line:rgba(245,240,230,0.12);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:radial-gradient(1200px 800px at 50% -10%, #1a2540 0%, var(--ink-night) 55%);
    color:var(--paper);
    font-family:'Zen Kaku Gothic New', sans-serif;
    min-height:100svh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 16px;
    -webkit-tap-highlight-color:transparent;
  }
  .display{font-family:'Shippori Antique B1', 'Zen Kaku Gothic New', sans-serif;}
  .app{
    width:100%;
    max-width:440px;
  }
  .screen{display:none;}
  .screen.active{display:block; animation:fadeUp .5s ease both;}
  @keyframes fadeUp{
    from{opacity:0; transform:translateY(14px);}
    to{opacity:1; transform:translateY(0);}
  }

  /* ---------- START ---------- */
  .eyebrow{
    letter-spacing:.28em;
    font-size:12px;
    color:var(--alert-amber);
    text-align:center;
    margin-bottom:14px;
    font-weight:700;
  }
  .title-block{text-align:center; margin-bottom:36px;}
  .title-block h1{
    font-size:44px;
    line-height:1.25;
    margin:0;
    letter-spacing:.02em;
  }
  .title-block h1 span{color:var(--alert-amber);}
  .rule-card{
    background:var(--ink-night-2);
    border:1px solid var(--line);
    border-radius:4px;
    padding:20px 22px;
    margin-bottom:32px;
  }
  .rule-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    padding:10px 0;
    border-bottom:1px dashed var(--line);
    font-size:14px;
    color:var(--fog);
  }
  .rule-row:last-child{border-bottom:none;}
  .rule-row b{
    color:var(--paper);
    font-size:16px;
    font-weight:700;
  }
  .btn{
    display:block;
    width:100%;
    border:none;
    border-radius:3px;
    padding:18px 20px;
    font-size:17px;
    font-weight:700;
    font-family:inherit;
    cursor:pointer;
    text-align:center;
    letter-spacing:.03em;
    transition:transform .12s ease, filter .12s ease;
  }
  .btn:active{transform:scale(.98);}
  .btn-primary{
    background:var(--alert-amber);
    color:#1a1206;
    box-shadow:0 0 0 1px var(--alert-amber-dim), 0 12px 28px -10px rgba(242,169,59,.55);
  }
  .btn-primary:hover{filter:brightness(1.05);}
  .footer-note{
    text-align:center;
    font-size:11px;
    color:var(--fog);
    margin-top:22px;
    letter-spacing:.04em;
  }

  /* ---------- QUIZ ---------- */
  .fuse-track{
    position:relative;
    height:8px;
    background:var(--ink-night-3);
    border-radius:4px;
    overflow:hidden;
    margin-bottom:10px;
    border:1px solid var(--line);
  }
  .fuse-fill{
    height:100%;
    width:100%;
    background:var(--alert-amber);
    transition:width .12s linear, background-color .3s ease;
  }
  .fuse-fill.critical{
    background:var(--danger-red);
    animation:pulse 0.6s infinite;
  }
  @media (prefers-reduced-motion: reduce){
    .fuse-fill.critical{animation:none;}
    .screen.active{animation:none;}
  }
  @keyframes pulse{
    0%,100%{opacity:1;}
    50%{opacity:.55;}
  }
  .quiz-meta{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:12px;
    color:var(--fog);
    letter-spacing:.08em;
    margin-bottom:22px;
  }
  .quiz-meta b{color:var(--paper); font-size:13px;}
  .q-eyebrow{
    font-size:12px;
    color:var(--alert-amber);
    letter-spacing:.2em;
    font-weight:700;
    margin-bottom:10px;
  }
  .q-text{
    font-size:22px;
    line-height:1.6;
    font-weight:700;
    margin:0 0 28px;
    min-height:100px;
  }
  .choice{
    display:flex;
    align-items:center;
    gap:14px;
    width:100%;
    background:var(--ink-night-2);
    border:1px solid var(--line);
    border-radius:4px;
    padding:18px 18px;
    margin-bottom:14px;
    color:var(--paper);
    font-family:inherit;
    font-size:16px;
    font-weight:500;
    text-align:left;
    cursor:pointer;
    transition:border-color .15s ease, background .15s ease, transform .12s ease;
  }
  .choice:active{transform:scale(.99);}
  .choice .tag{
    flex:0 0 auto;
    width:32px;
    height:32px;
    border-radius:50%;
    background:var(--ink-night-3);
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Shippori Antique B1', sans-serif;
    font-size:15px;
    color:var(--alert-amber);
    border:1px solid var(--line);
  }
  .choice.correct{
    border-color:var(--safe-green);
    background:rgba(46,145,102,0.18);
  }
  .choice.correct .tag{background:var(--safe-green); color:var(--paper); border-color:var(--safe-green);}
  .choice.wrong{
    border-color:var(--danger-red);
    background:rgba(209,84,92,0.16);
  }
  .choice.wrong .tag{background:var(--danger-red); color:var(--paper); border-color:var(--danger-red);}
  .choice[disabled]{cursor:default;}

  .explain{
    font-size:13px;
    color:var(--fog);
    line-height:1.7;
    background:var(--ink-night-2);
    border-left:3px solid var(--alert-amber);
    padding:14px 16px;
    border-radius:2px;
    margin-top:6px;
    display:none;
  }
  .explain.show{display:block; animation:fadeUp .35s ease both;}

  /* ---------- RESULT ---------- */
  .seal-wrap{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin:8px 0 26px;
  }
  .seal{
    width:168px;
    height:168px;
    border-radius:50%;
    border:3px solid var(--alert-amber);
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    background:radial-gradient(circle at 50% 40%, rgba(242,169,59,0.12), transparent 70%);
  }
  .seal::before{
    content:"防 災 検 定 ・ 認 定";
    position:absolute;
    inset:10px;
    border:1px dashed var(--alert-amber-dim);
    border-radius:50%;
  }
  .seal .rank-letter{
    font-family:'Shippori Antique B1', sans-serif;
    font-size:76px;
    color:var(--alert-amber);
  }
  .result-score{
    text-align:center;
    font-size:15px;
    color:var(--fog);
    margin-bottom:6px;
  }
  .result-score b{
    color:var(--paper);
    font-size:22px;
  }
  .result-comment{
    text-align:center;
    font-size:14px;
    color:var(--paper);
    line-height:1.8;
    margin:18px 0 30px;
    padding:0 6px;
  }

  h1,h2,p{margin:0;}
</style>
</head>
<body>
<div class="app">

  <!-- ============ START SCREEN ============ -->
  <section class="screen active" id="screen-start">
    <div class="eyebrow">BOUSAI SURVIVAL QUIZ</div>
    <div class="title-block">
      <h1 class="display">防災<br><span>サバイバル</span>クイズ</h1>
    </div>
    <div class="rule-card">
      <div class="rule-row"><span>問題数</span><b>全10問・2択</b></div>
      <div class="rule-row"><span>制限時間</span><b>1問につき40秒</b></div>
      <div class="rule-row"><span>結果</span><b>正解数に応じてランク認定</b></div>
    </div>
    <button class="btn btn-primary" id="btn-start">挑戦をはじめる</button>
    <div class="footer-note">〇〇高校 文化祭 課題研究発表「防災」</div>
  </section>

  <!-- ============ QUIZ SCREEN ============ -->
  <section class="screen" id="screen-quiz">
    <div class="fuse-track"><div class="fuse-fill" id="fuse-fill"></div></div>
    <div class="quiz-meta">
      <span>REMAINING <b id="timer-label">40</b>s</span>
      <span>Q <b id="q-index">1</b> / 10</span>
    </div>
    <div class="q-eyebrow">Q<span id="q-number">1</span></div>
    <p class="q-text" id="q-text"></p>
    <button class="choice" id="choice-a"><span class="tag">A</span><span id="choice-a-text"></span></button>
    <button class="choice" id="choice-b"><span class="tag">B</span><span id="choice-b-text"></span></button>
    <div class="explain" id="explain"></div>
  </section>

  <!-- ============ RESULT SCREEN ============ -->
  <section class="screen" id="screen-result">
    <div class="eyebrow">RESULT</div>
    <div class="seal-wrap">
      <div class="seal"><span class="rank-letter" id="rank-letter">S</span></div>
    </div>
    <div class="result-score"><b id="score-num">10</b> / 10問 正解</div>
    <p class="result-comment" id="result-comment"></p>
    <button class="btn btn-primary" id="btn-retry">もう一度挑戦する</button>
    <div class="footer-note">〇〇高校 文化祭 課題研究発表「防災」</div>
  </section>

</div>

<script>
/* ============================================================
   クイズ内容はここを編集すれば差し替えられます。
   correct: "a" または "b"
   ============================================================ */
const QUESTIONS = [
  {
    q: "大きな地震の揺れを感じた。まず何をする？",
    a: "すぐに外へ飛び出す",
    b: "机の下などに入り頭を守る",
    correct: "b",
    explain: "揺れている最中の移動は転倒や落下物で危険。まず低い姿勢で頭と体を守り、揺れが収まってから避難しよう。"
  },
  {
    q: "地震のあと、避難するときエレベーターは？",
    a: "使わず階段を使う",
    b: "急いでいるので使ってよい",
    correct: "a",
    explain: "地震後はエレベーターが緊急停止し、閉じ込められる危険がある。避難は階段を使うのが基本。"
  },
  {
    q: "家庭での飲料水の備蓄、目安は1人1日あたりどのくらい？",
    a: "約1リットル",
    b: "約3リットル",
    correct: "b",
    explain: "飲料水は1人1日3リットルが目安。最低3日分、できれば1週間分の備蓄が推奨されている。"
  },
  {
    q: "津波警報が発表された。とるべき行動は？",
    a: "高台や高い建物へすぐ避難する",
    b: "海の様子を見に行く",
    correct: "a",
    explain: "津波は想像より速く、引き波の後に大きな波が来ることもある。様子を見に行かず、直ちに高い場所へ避難する。"
  },
  {
    q: "台風が接近している。家の窓ガラスへの備えは？",
    a: "養生テープや雨戸で補強する",
    b: "特に何もしなくてよい",
    correct: "a",
    explain: "強風で飛来物がぶつかり割れることがある。テープや雨戸・段ボールなどで飛散防止をしておくと安全。"
  },
  {
    q: "火事が起きた。煙が充満した部屋を移動するときは？",
    a: "できるだけ姿勢を低くして進む",
    b: "立ったまま素早く歩く",
    correct: "a",
    explain: "煙は上にたまりやすく、有毒ガスを吸うと危険。姿勢を低くし、口や鼻をハンカチなどで覆って移動する。"
  },
  {
    q: "非常持ち出し袋を置いておく場所として適切なのは？",
    a: "押し入れの奥など収納の奥",
    b: "玄関などすぐ持ち出せる場所",
    correct: "b",
    explain: "災害時は一刻を争う。すぐ手に取れる玄関や寝室の出入口付近に置いておくのが望ましい。"
  },
  {
    q: "停電した夜、明かりとしてろうそくを使うのは？",
    a: "余震での転倒や火災の危険があるため極力避ける",
    b: "雰囲気も出るので積極的に使う",
    correct: "a",
    explain: "余震でろうそくが倒れ火災につながる例がある。懐中電灯やLEDランタンなど、倒れても燃えないものを使おう。"
  },
  {
    q: "災害時、家族の安否を確認できる「災害用伝言ダイヤル」の番号は？",
    a: "171",
    b: "110",
    correct: "a",
    explain: "171は災害用伝言ダイヤル。110は警察への通報番号なので、安否確認には使わない。"
  },
  {
    q: "自分の避難場所やハザードマップを確認するタイミングは？",
    a: "災害が起きてから調べる",
    b: "普段からあらかじめ確認しておく",
    correct: "b",
    explain: "災害発生後は情報収集が難しくなることも多い。自治体のハザードマップで避難場所・経路を事前に確認しておこう。"
  }
];

const TIME_PER_Q = 40; // 秒

let current = 0;
let correctCount = 0;
let timer = null;
let timeLeft = TIME_PER_Q;
let answered = false;

const $ = (id) => document.getElementById(id);

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $(id).classList.add('active');
}

function startQuiz(){
  current = 0;
  correctCount = 0;
  showScreen('screen-quiz');
  loadQuestion();
}

function loadQuestion(){
  answered = false;
  const item = QUESTIONS[current];
  $('q-number').textContent = current + 1;
  $('q-index').textContent = current + 1;
  $('q-text').textContent = item.q;
  $('choice-a-text').textContent = item.a;
  $('choice-b-text').textContent = item.b;

  ['choice-a','choice-b'].forEach(id=>{
    const el = $(id);
    el.classList.remove('correct','wrong');
    el.disabled = false;
  });
  $('explain').classList.remove('show');
  $('explain').textContent = '';

  timeLeft = TIME_PER_Q;
  updateFuse();
  clearInterval(timer);
  timer = setInterval(()=>{
    timeLeft -= 0.1;
    if(timeLeft <= 0){
      timeLeft = 0;
      updateFuse();
      clearInterval(timer);
      if(!answered) handleAnswer(null);
      return;
    }
    updateFuse();
  }, 100);
}

function updateFuse(){
  const pct = Math.max(0, (timeLeft / TIME_PER_Q) * 100);
  const fill = $('fuse-fill');
  fill.style.width = pct + '%';
  $('timer-label').textContent = Math.ceil(timeLeft);
  if(timeLeft <= 10){
    fill.classList.add('critical');
  } else {
    fill.classList.remove('critical');
  }
}

function handleAnswer(choice){
  if(answered) return;
  answered = true;
  clearInterval(timer);

  const item = QUESTIONS[current];
  const isCorrect = choice === item.correct;
  if(isCorrect) correctCount++;

  ['a','b'].forEach(c=>{
    const el = $('choice-' + c);
    el.disabled = true;
    if(c === item.correct) el.classList.add('correct');
    else if(c === choice) el.classList.add('wrong');
  });

  const explainEl = $('explain');
  explainEl.textContent = item.explain;
  explainEl.classList.add('show');

  setTimeout(()=>{
    current++;
    if(current < QUESTIONS.length){
      loadQuestion();
    } else {
      showResult();
    }
  }, 2200);
}

function showResult(){
  showScreen('screen-result');
  $('score-num').textContent = correctCount;

  let rank, comment;
  if(correctCount >= 9){
    rank = 'S';
    comment = '防災マスター！その知識、いざという時にきっと頼りになります。';
  } else if(correctCount >= 7){
    rank = 'A';
    comment = '十分な備え！もう少しで完璧。間違えた問題は見直しておこう。';
  } else if(correctCount >= 5){
    rank = 'B';
    comment = '基本は身についています。もう一歩、備えを見直してみよう。';
  } else {
    rank = 'C';
    comment = 'まずは知ることから。今日をきっかけに防災を意識してみよう。';
  }
  $('rank-letter').textContent = rank;
  $('result-comment').textContent = comment;
}

$('btn-start').addEventListener('click', startQuiz);
$('btn-retry').addEventListener('click', startQuiz);
$('choice-a').addEventListener('click', ()=>handleAnswer('a'));
$('choice-b').addEventListener('click', ()=>handleAnswer('b'));
</script>
</body>
</html>
